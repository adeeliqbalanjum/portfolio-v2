name: Deploy portfolio v2 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Normalize CSS font import
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const file = 'app/globals.css';
          const css = fs.readFileSync(file, 'utf8');
          const importLine = "@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');\n\n";
          const withoutFontImports = css.replace(/@import\s+url\(['"]https:\/\/fonts\.googleapis\.com\/css2\?family=Inter:[\s\S]*?display=swap['"]\);\s*/g, '');
          fs.writeFileSync(file, importLine + withoutFontImports.trimStart());
          NODE

      - name: Build static site
        run: npm run build
        env:
          BASE_PATH: /portfolio-v2
          NEXT_PUBLIC_BASE_PATH: /portfolio-v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
